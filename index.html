<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIプレゼン自動生成システム | Enterprise Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00796B;
  --primary-light: #4DB6AC;
  --primary-soft: rgba(0, 121, 107, 0.08);
  --accent: #FFAB40;
  --bg-app: #F4F7F7;
  --bg-card: #FFFFFF;
  --text-main: #1A202C;
  --text-sub: #4A5568;
  --border: #E2E8F0;
  --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.06);
  --radius-lg: 24px;
  --radius-md: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg-app);
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.6;
}

header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 0 40px; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0, 121, 107, 0.15);
  position: sticky; top: 0; z-index: 1000;
}
.logo { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 0.05em; }
.logo span { opacity: 0.8; font-weight: 400; }

main { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

.steps-bar { display: flex; align-items: center; margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 100px; box-shadow: var(--shadow-premium); }
.step { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; color: #94A3B8; font-weight: 700; font-size: 14px; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.3s; }
.step.active { color: var(--primary); }
.step.active .step-num { background: var(--primary); color: #fff; }
.step.done .step-num { background: #10B981; color: #fff; }
.step-line { width: 40px; height: 2px; background: #E2E8F0; }

.card { background: #fff; border-radius: var(--radius-lg); padding: 50px; margin-bottom: 30px; box-shadow: var(--shadow-premium); display: none; }
.card.active { display: block; animation: fadeInUp 0.6s ease forwards; }
.card-title { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
.card-title::before { content: ''; width: 6px; height: 24px; background: var(--accent); border-radius: 3px; }

.field { margin-bottom: 24px; }
.field label { display: block; font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 14px 18px; border: 2px solid #EDF2F7; border-radius: var(--radius-md);
  font-size: 15px; background: #F8FAFC; outline: none; transition: 0.2s;
}
.field textarea { height: 200px; resize: vertical; }

.upload-area {
  border: 2px dashed #CBD5E1; border-radius: var(--radius-lg); padding: 50px;
  text-align: center; cursor: pointer; background: #F8FAFC; position: relative; transition: 0.3s;
}
.upload-area:hover { border-color: var(--primary); background: #fff; }
.upload-area.has-file { border-color: #10B981; background: #ECFDF5; }
.upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.btn-primary {
  width: 100%; padding: 20px; background: var(--primary); color: #fff;
  font-size: 18px; font-weight: 900; border: none; border-radius: var(--radius-md); cursor: pointer;
  transition: 0.3s; box-shadow: 0 10px 25px rgba(0, 121, 107, 0.25);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 121, 107, 0.35); }

/* スライド表示用 */
.slide-outer { border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.25); margin-bottom: 40px; background: #000; min-height: 200px; }
.slide-viewport { width: 100%; position: relative; background: #fff; overflow: hidden; aspect-ratio: 16 / 9; }
.slide-page { position: absolute; inset: 0; width: 1280px; height: 720px; transform-origin: top left; display: none; background: #fff; }
.slide-page.active { display: flex; flex-direction: column; }

.sl-wrap { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
.sl-bg-decor { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.sl-blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }

.sl-header { height: 110px; padding: 0 70px; display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.06); z-index: 10; background: #fff; }
.sl-header-title { font-size: 38px; font-weight: 900; color: var(--primary); }

.sl-body { flex: 1; padding: 60px 80px; position: relative; z-index: 5; display: flex; flex-direction: column; }

/* レイアウト別 */
.layout-hero { flex-direction: row !important; }
.hero-img { flex: 1.4; position: relative; overflow: hidden; }
.hero-img img { width: 100%; height: 100%; object-fit: cover; }
.hero-content { flex: 1; padding: 80px; display: flex; flex-direction: column; justify-content: center; background: var(--primary); color: #fff; }
.hero-title { font-size: 72px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
.hero-desc { font-size: 26px; border-left: 4px solid var(--accent); padding-left: 20px; }

.hub-center { width: 280px; height: 280px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 36px; font-weight: 900; position: relative; z-index: 20; border: 10px solid #fff; }
.hub-items { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; position: absolute; inset: 80px; z-index: 10; }
.hub-item { background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 15px; }

.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; flex: 1; }
.compare-box { padding: 50px; border-radius: 30px; display: flex; flex-direction: column; gap: 24px; border: 1px solid var(--border); }
.compare-box.after { background: var(--primary-soft); border-color: var(--primary-light); }
.compare-tag { display: inline-block; padding: 10px 30px; border-radius: 100px; font-weight: 900; font-size: 20px; color: #fff; align-self: flex-start; }

.list-item { display: flex; align-items: flex-start; gap: 25px; padding: 30px; background: #fff; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-left: 8px solid var(--primary); }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

footer { text-align: center; padding: 50px; color: #94A3B8; font-size: 15px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>Pres</span> Generator | Enterprise</div>
</header>

<main>
  <div class="steps-bar">
    <div class="step active" id="st1"><div class="step-num">1</div>既存資料解析</div>
    <div class="step-line"></div>
    <div class="step" id="st2"><div class="step-num">2</div>原稿ファイル投入</div>
    <div class="step-line"></div>
    <div class="step" id="st3"><div class="step-num">3</div>構成案確定</div>
    <div class="step-line"></div>
    <div class="step" id="st4"><div class="step-num">4</div>完成プレビュー</div>
  </div>

  <div class="card panel active" id="panel1">
    <div class="card-title">STEP 1　既存資料（テンプレート元）のアップロード</div>
    <div class="upload-area" id="area1">
      <input type="file" onchange="handleUpload(this)">
      <div style="font-size:50px;">📄</div>
      <p style="font-weight:800; margin-top:10px;" id="sub1">スライド画像をアップロードしてください</p>
    </div>
    <p style="margin-top:15px; font-size:13px; color:var(--text-sub);">※ 既存資料からブランドカラーやレイアウト構造を自動解析し、テンプレートを構築します。</p>
    <button class="btn-primary" style="margin-top:40px;" id="btnNext1" onclick="setStep(2)">解析して次へ →</button>
  </div>

  <div class="card panel" id="panel2">
    <div class="card-title">STEP 2　プレゼン原稿ファイルの投入</div>
    <div class="upload-area" id="area2" style="margin-bottom:30px;">
      <input type="file" accept=".txt" onchange="handleTextUpload(this)">
      <div style="font-size:50px;">📑</div>
      <p style="font-weight:800; margin-top:10px;" id="sub2">原稿ファイル（.txt）を選択してください</p>
    </div>
    <div class="field">
      <label>読み込まれた原稿（編集可能）</label>
      <textarea id="sourceText" placeholder="ファイルをアップロードするか、直接入力してください。"></textarea>
    </div>
    <button class="btn-primary" onclick="generateOutline()">AI構成案を生成する →</button>
  </div>

  <div class="card panel" id="panelL1"><div style="text-align:center; padding:60px;"><div style="width:40px; height:40px; border:4px solid var(--primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div><p>論理構造を構築中...</p></div></div>
  <div class="card panel" id="panelL2"><div style="text-align:center; padding:60px;"><div style="width:40px; height:40px; border:4px solid var(--primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div><p>デザインを適用中...</p></div></div>

  <div class="card panel" id="panel3">
    <div class="card-title">STEP 3　AI構成案の最終確認</div>
    <div id="outlineBox" style="background:#F8FAFC; padding:40px; border:2px solid #EDF2F7; border-radius:20px; white-space:pre-wrap; margin-bottom:30px; min-height:150px; font-size:15px; color:var(--text-main);"></div>
    <button class="btn-primary" onclick="buildPresentation()">この構成でスライドを構築する →</button>
  </div>

  <div class="card panel" id="panel4">
    <div class="card-title">STEP 4　完成プレビュー</div>
    <div class="slide-outer"><div class="slide-viewport" id="slideViewport"></div></div>
    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px;">
      <button class="btn-primary" style="width:120px; padding:10px; background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="navSlide(-1)">前へ</button>
      <div id="slideDots" style="display:flex; align-items:center; gap:10px;"></div>
      <button class="btn-primary" style="width:120px; padding:10px; background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="navSlide(1)">次へ</button>
    </div>
    <button class="btn-primary" style="margin-bottom:10px;" onclick="downloadPPTX()">PowerPoint (.pptx) をダウンロード</button>
    <button class="btn-primary" style="background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="downloadHTML()">プレゼン用HTMLをダウンロード</button>
  </div>
</main>

<!-- 外部ライブラリの読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

<script>
// PDF.jsの設定
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let themeColor = '#00796B', outline = '', slideData = [], currentSlide = 0, templateAnalysis = null;
const ICONS = ['🎯','⚡','💡','🌟','📊','🔍','🛠','📈','🚀','💎','🎨','🧩','📢'];

function setStep(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const id = ['panel1','panel2','panel3','panel4'][n-1];
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    if (n === 4) setTimeout(scaleSlides, 100);
  }
  document.querySelectorAll('.step').forEach((s, i) => { s.classList.toggle('active', i === n-1); s.classList.toggle('done', i < n-1); });
}

// PDFから画像への変換
async function convertPdfToImage(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.0 });
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  canvas.height = viewport.height; canvas.width = viewport.width;
  await page.render({ canvasContext: context, viewport: viewport }).promise;
  return canvas.toDataURL('image/png').split(',')[1];
}

async function handleUpload(input) {
  const file = input.files[0]; if(!file) return;
  document.getElementById('sub1').textContent = file.name + ' 解析中...';
  document.getElementById('area1').classList.add('has-file');
  try {
    let base64Data = '', mediaType = file.type;
    if (file.type === 'application/pdf') {
      base64Data = await convertPdfToImage(file);
      mediaType = 'image/png';
    } else {
      const reader = new FileReader();
      base64Data = await new Promise(r => { reader.onload = e => r(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
    }
    const res = await fetch('/api/analyze-template', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ imageBase64: base64Data, mediaType: mediaType }) });
    const data = await res.json();
    if(res.ok && data.analysis) {
      templateAnalysis = data.analysis;
      if(data.analysis.mainColor) { themeColor = data.analysis.mainColor; document.documentElement.style.setProperty('--primary', themeColor); }
      document.getElementById('sub1').textContent = file.name + ' 解析完了 ✓';
    } else { throw new Error(data.error || '解析失敗'); }
  } catch(err) {
    document.getElementById('sub1').textContent = '解析失敗。標準設定を使います。';
    alert('解析エラー: ' + err.message);
  }
}

function handleTextUpload(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('sourceText').value = e.target.result;
    document.getElementById('sub2').textContent = file.name + ' 読み込み完了 ✓';
    document.getElementById('area2').classList.add('has-file');
  };
  reader.readAsText(file);
}

async function generateOutline() {
  const source = document.getElementById('sourceText').value.trim();
  if(!source) return alert('原稿内容を入力してください');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panelL1').classList.add('active');
  try {
    const res = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ theme: 'ビジネスプレゼンテーション', notes: source, templateAnalysis: templateAnalysis }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    outline = data.result || '';
    document.getElementById('outlineBox').innerText = outline || "構成案の生成に失敗しました。";
    setStep(3);
  } catch(e) { setStep(2); alert('AI通信エラー: ' + e.message); }
}

function parseOutline(text) {
  if(!text) return [];
  const slides = [];
  const rawSections = text.split(/(?:###|スライド|Slide)\s*\d+\s*[：:]?/gi).filter(s => s.trim());
  rawSections.forEach((content, i) => {
    const lines = content.split('\n').filter(l => l.trim());
    if (lines.length === 0) return;
    let title = lines[0].replace(/^[#*\s：:]+/, '').replace(/[#*\s：:]+$/, '').trim();
    const points = lines.slice(1).map(l => l.replace(/^[・\-\s\d.*]+/, '').trim()).filter(p => p.length > 0);
    let layout = 'list';
    if (i === 0) layout = 'hero';
    else {
      const low = content.toLowerCase();
      if (low.includes('比較') || low.includes('対比')) layout = 'compare';
      else if (points.length >= 4) layout = 'hub';
    }
    slides.push({ title, points, layout });
  });
  return slides;
}

function renderSlides() {
  const vp = document.getElementById('slideViewport'); vp.innerHTML = '';
  slideData.forEach((s, idx) => {
    const page = document.createElement('div'); page.className = 'slide-page'; page.id = `sp-${idx}`;
    const tc = themeColor;
    let html = `<div class="sl-wrap"><div class="sl-bg-decor"><div class="sl-blob" style="width:800px; height:800px; background:${tc}; top:-300px; right:-100px;"></div></div>`;
    if (s.layout === 'hero') {
      html += `<div class="sl-wrap layout-hero"><div class="hero-img"><img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1280&q=80"></div><div class="hero-content"><div class="hero-title" id="ht-${idx}" style="font-size: min(72px, ${1000/s.title.length}px)">${s.title}</div><div class="hero-desc" id="hd-${idx}">${s.points.join(' | ')}</div></div></div>`;
    } else if (s.layout === 'compare') {
      const mid = Math.ceil(s.points.length / 2);
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body"><div class="compare-grid"><div class="compare-box before" id="cb-${idx}-0"><span class="compare-tag" style="background:#718096">現状</span>${s.points.slice(0,mid).map(p=>`<div>・ ${p}</div>`).join('')}</div><div class="compare-box after" id="cb-${idx}-1" style="border-color:${tc}"><span class="compare-tag" style="background:${tc}">改善後</span>${s.points.slice(mid).map(p=>`<div style="color:${tc}; font-weight:700;">・ ${p}</div>`).join('')}</div></div></div>`;
    } else if (s.layout === 'hub') {
      const fontSize = s.title.length > 10 ? '24px' : '32px';
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body" style="justify-content:center; align-items:center;"><div class="hub-center" id="hc-${idx}" style="background:${tc}; font-size:${fontSize}; padding:20px; line-height:1.2; text-align:center; overflow:hidden; display:flex; align-items:center; justify-content:center; word-break:break-all;">${s.title}</div><div class="hub-items">${s.points.slice(0,4).map((p,pi)=>`<div class="hub-item" id="hi-${idx}-${pi}"><div style="font-size:50px;">${ICONS[pi%ICONS.length]}</div><div style="font-weight:900; color:${tc}; text-align:center;">${p}</div></div>`).join('')}</div></div>`;
    } else {
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body">${s.points.map((p,pi)=>`<div class="list-item" id="li-${idx}-${pi}" style="border-left-color:${tc}"><div><div style="font-size:24px; font-weight:900; color:${tc}">${p}</div></div></div>`).join('')}</div>`;
    }
    html += `</div>`; page.innerHTML = html; vp.appendChild(page);
  });
  scaleSlides();
}

function showSlide(idx) {
  document.querySelectorAll('.slide-page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(`sp-${idx}`); if(!page) return; page.classList.add('active');
  const s = slideData[idx]; if(!s) return;
  if(s.layout==='hero'){ animEl(`ht-${idx}`,'fadeInUp 0.8s forwards'); animEl(`hd-${idx}`,'fadeInUp 0.8s 0.3s forwards'); }
  else if(s.layout==='compare'){ animEl(`cb-${idx}-0`,'fadeInUp 0.7s forwards'); animEl(`cb-${idx}-1`,'fadeInUp 0.7s 0.3s forwards'); }
  else if(s.layout==='hub'){ animEl(`hc-${idx}`,'fadeInUp 0.6s forwards'); s.points.forEach((_,pi)=>animEl(`hi-${idx}-${pi}`,`fadeInUp 0.5s ${0.4+pi*0.1}s forwards`)); }
  else { s.points.forEach((_,pi)=>animEl(`li-${idx}-${pi}`,`fadeInUp 0.6s ${0.1+pi*0.1}s forwards`)); }
  currentSlide = idx;
  document.querySelectorAll('.sdot').forEach((d,i)=>d.style.background = i===idx?themeColor:'#E2E8F0');
}

function animEl(id, anim) { const el = document.getElementById(id); if(!el) return; el.style.animation = 'none'; el.style.opacity = '0'; void el.offsetWidth; el.style.animation = anim; }

function buildPresentation() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panelL2').classList.add('active');
  setTimeout(() => { slideData = parseOutline(outline); renderSlides(); setStep(4); buildDots(); showSlide(0); }, 1000);
}

function scaleSlides() {
  const vp = document.getElementById('slideViewport'); if(!vp || vp.offsetWidth === 0) return;
  const s = vp.offsetWidth / 1280; vp.style.height = (720*s)+'px';
  vp.querySelectorAll('.slide-page').forEach(p => p.style.transform = `scale(${s})`);
}

function buildDots() {
  const dc = document.getElementById('slideDots'); dc.innerHTML = '';
  slideData.forEach((_,i) => {
    const d = document.createElement('div'); d.className = 'sdot';
    d.style = 'width:12px; height:12px; border-radius:50%; background:#E2E8F0; cursor:pointer;';
    d.onclick = () => showSlide(i); dc.appendChild(d);
  });
}

function navSlide(dir) { const next = currentSlide + dir; if(next >= 0 && next < slideData.length) showSlide(next); }

// PowerPointダウンロード機能（デザイン忠実再現版）
function downloadPPTX() {
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_16x9';
  const tc = themeColor.replace('#', '');

  slideData.forEach((s, idx) => {
    const slide = pptx.addSlide();
    slide.background = { color: 'FFFFFF' };

    // 背景の装飾（Blobs）を再現
    slide.addShape(pptx.ShapeType.ellipse, { fill: { color: tc, transparency: 92 }, x: 8.5, y: -1, w: 6, h: 6 });
    slide.addShape(pptx.ShapeType.ellipse, { fill: { color: tc, transparency: 95 }, x: -2, y: 4, w: 5, h: 5 });

    if (s.layout === 'hero') {
      // 左側：画像
      slide.addImage({ 
        path: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1280&q=80", 
        x: 0, y: 0, w: '50%', h: '100%', sizing: { type: 'cover' } 
      });
      // 右側：カラーブロック
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: '50%', y: 0, w: '50%', h: '100%' });
      // 装飾ライン（オレンジ系を想定）
      slide.addShape(pptx.ShapeType.rect, { fill: { color: 'FF8C00' }, x: '55%', y: '48%', w: 0.05, h: '25%' });
      // タイトル
      slide.addText(s.title, { 
        x: '55%', y: '25%', w: '40%', fontSize: 36, bold: true, color: 'FFFFFF', fontFace: 'Meiryo' 
      });
      // 詳細（箇条書きを1行に）
      slide.addText(s.points.join(' | '), { 
        x: '57%', y: '50%', w: '38%', fontSize: 18, color: 'FFFFFF', fontFace: 'Meiryo', lineSpacing: 28 
      });

    } else if (s.layout === 'hub') {
      // ヘッダー
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.5, y: 0.4, w: 0.1, h: 0.5 });
      slide.addText(s.title, { x: 0.7, y: 0.45, fontSize: 28, bold: true, color: '333333', fontFace: 'Meiryo' });
      
      // 中央の円
      const circleSize = 2.2;
      slide.addShape(pptx.ShapeType.ellipse, { 
        fill: { color: tc }, x: (10-circleSize)/2, y: (5.6-circleSize)/2 + 0.5, w: circleSize, h: circleSize 
      });
      slide.addText(s.title, { 
        x: (10-circleSize)/2, y: (5.6-circleSize)/2 + 0.5, w: circleSize, h: circleSize, 
        fontSize: 16, bold: true, color: 'FFFFFF', align: 'center', valign: 'middle', fontFace: 'Meiryo' 
      });

      // 周囲のアイテム
      const positions = [
        { x: 1.5, y: 1.8 }, { x: 6.3, y: 1.8 },
        { x: 1.5, y: 3.5 }, { x: 6.3, y: 3.5 }
      ];
      s.points.slice(0, 4).forEach((p, i) => {
        const pos = positions[i];
        slide.addShape(pptx.ShapeType.roundRect, { 
          fill: { color: 'FFFFFF' }, line: { color: 'E2E8F0', width: 1 }, 
          x: pos.x, y: pos.y, w: 2.2, h: 1.2, rectRadius: 0.1,
          shadow: { type: 'outer', color: '000000', opacity: 0.1, blur: 3, offset: 2 }
        });
        slide.addText(p, { 
          x: pos.x, y: pos.y, w: 2.2, h: 1.2, fontSize: 14, color: '333333', 
          align: 'center', valign: 'middle', fontFace: 'Meiryo' 
        });
      });

    } else if (s.layout === 'compare') {
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.5, y: 0.4, w: 0.1, h: 0.5 });
      slide.addText(s.title, { x: 0.7, y: 0.45, fontSize: 28, bold: true, color: '333333', fontFace: 'Meiryo' });
      
      const mid = Math.ceil(s.points.length / 2);
      // 現状
      slide.addShape(pptx.ShapeType.roundRect, { fill: { color: 'F8FAFC' }, x: 0.8, y: 1.5, w: 4, h: 3.5, rectRadius: 0.1 });
      slide.addText("現状", { x: 1.0, y: 1.7, w: 1, h: 0.4, fontSize: 14, color: 'FFFFFF', fill: { color: '718096' }, align: 'center', fontFace: 'Meiryo' });
      slide.addText(s.points.slice(0, mid).map(p=>`・ ${p}`).join('\n'), { x: 1.0, y: 2.2, w: 3.6, fontSize: 16, color: '4A5568', fontFace: 'Meiryo' });
      
      // 改善後
      slide.addShape(pptx.ShapeType.roundRect, { fill: { color: 'FFFFFF' }, line: { color: tc, width: 2 }, x: 5.2, y: 1.5, w: 4, h: 3.5, rectRadius: 0.1 });
      slide.addText("改善後", { x: 5.4, y: 1.7, w: 1, h: 0.4, fontSize: 14, color: 'FFFFFF', fill: { color: tc }, align: 'center', fontFace: 'Meiryo' });
      slide.addText(s.points.slice(mid).map(p=>`・ ${p}`).join('\n'), { x: 5.4, y: 2.2, w: 3.6, fontSize: 16, color: tc, bold: true, fontFace: 'Meiryo' });

    } else {
      // 標準のリスト型
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.5, y: 0.4, w: 0.1, h: 0.5 });
      slide.addText(s.title, { x: 0.7, y: 0.45, fontSize: 28, bold: true, color: '333333', fontFace: 'Meiryo' });

      s.points.forEach((p, i) => {
        slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.8, y: 1.6 + (i * 0.9), w: 0.05, h: 0.7 });
        slide.addText(p, { 
          x: 1.0, y: 1.6 + (i * 0.9), w: '85%', fontSize: 20, color: '333333', bold: true, fontFace: 'Meiryo' 
        });
      });
    }
  });
  pptx.writeFile({ fileName: `presentation_${new Date().getTime()}.pptx` });
}

function downloadHTML() {
  const tc = themeColor, vp = document.getElementById('slideViewport');
  const pages = Array.from(vp.querySelectorAll('.slide-page')).map((p,i) => {
    const c = p.cloneNode(true); c.classList.toggle('active', i===0);
    c.querySelectorAll('[style*="opacity"]').forEach(el => { el.style.opacity='1'; el.style.animation='none'; el.style.transform=''; });
    return c.outerHTML;
  }).join('\n');
  const style = document.querySelector('style').innerHTML;
  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>${style}</style></head><body style="margin:0; background:#000;"><div style="width:100vw; height:56.25vw; position:relative; overflow:hidden; background:#fff; margin:auto; top:50%; transform:translateY(-50%);">${pages}</div>
  <script>
    let cur = 0; const p = document.querySelectorAll('.slide-page');
    function show(n) { if(n<0||n>=p.length)return; p[cur].classList.remove('active'); cur=n; p[cur].classList.add('active'); }
    window.addEventListener('keydown', e => { if(e.key==='ArrowRight'||e.key===' ') show(cur+1); if(e.key==='ArrowLeft') show(cur-1); });
  <\/script></body></html>`;
  const blob = new Blob([html], {type:'text/html'}); const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'presentation.html'; a.click();
}

window.addEventListener('resize', scaleSlides);
</script>
