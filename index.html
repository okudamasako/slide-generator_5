<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIプレゼン自動生成システム | Enterprise Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00796B;
  --primary-light: #4DB6AC;
  --primary-soft: rgba(0, 121, 107, 0.08);
  --accent: #FFAB40;
  --bg-app: #F4F7F7;
  --bg-card: #FFFFFF;
  --text-main: #1A202C;
  --text-sub: #4A5568;
  --border: #E2E8F0;
  --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.06);
  --radius-lg: 24px;
  --radius-md: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg-app);
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.6;
}

header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 0 40px; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0, 121, 107, 0.15);
  position: sticky; top: 0; z-index: 1000;
}
.logo { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 0.05em; }
.logo span { opacity: 0.8; font-weight: 400; }

main { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

.steps-bar { display: flex; align-items: center; margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 100px; box-shadow: var(--shadow-premium); }
.step { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; color: #94A3B8; font-weight: 700; font-size: 14px; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.3s; }
.step.active { color: var(--primary); }
.step.active .step-num { background: var(--primary); color: #fff; }
.step.done .step-num { background: #10B981; color: #fff; }
.step-line { width: 40px; height: 2px; background: #E2E8F0; }

.card { background: #fff; border-radius: var(--radius-lg); padding: 50px; margin-bottom: 30px; box-shadow: var(--shadow-premium); display: none; }
.card.active { display: block; animation: fadeInUp 0.6s ease forwards; }
.card-title { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
.card-title::before { content: ''; width: 6px; height: 24px; background: var(--accent); border-radius: 3px; }

.field { margin-bottom: 24px; }
.field label { display: block; font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 14px 18px; border: 2px solid #EDF2F7; border-radius: var(--radius-md);
  font-size: 15px; background: #F8FAFC; outline: none; transition: 0.2s;
}
.field textarea { height: 200px; resize: vertical; }

.upload-area {
  border: 2px dashed #CBD5E1; border-radius: var(--radius-lg); padding: 50px;
  text-align: center; cursor: pointer; background: #F8FAFC; position: relative; transition: 0.3s;
}
.upload-area:hover { border-color: var(--primary); background: #fff; }
.upload-area.has-file { border-color: #10B981; background: #ECFDF5; }
.upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.btn-primary {
  width: 100%; padding: 20px; background: var(--primary); color: #fff;
  font-size: 18px; font-weight: 900; border: none; border-radius: var(--radius-md); cursor: pointer;
  transition: 0.3s; box-shadow: 0 10px 25px rgba(0, 121, 107, 0.25);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 121, 107, 0.35); }

/* エグゼクティブ・ビジネスデザイン */
.slide-outer { border-radius: 12px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.2); margin-bottom: 30px; background: #000; border: 1px solid #ddd; }
.slide-viewport { width: 100%; position: relative; background: #fff; overflow: hidden; aspect-ratio: 16 / 9; }
.slide-page { position: absolute; inset: 0; width: 1280px; height: 720px; transform-origin: top left; display: none; background: #fff; color: #1a202c; }
.slide-page.active { display: flex; flex-direction: column; }

.sl-wrap { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }

/* テンプレート由来の装飾 */
.sl-accent-bar { position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: var(--primary); z-index: 100; }
.sl-footer-info { position: absolute; bottom: 30px; left: 60px; right: 60px; display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; font-weight: 700; border-top: 1px solid #f1f5f9; padding-top: 15px; }

.sl-header { padding: 60px 80px 20px 80px; z-index: 10; }
.sl-header-title { font-size: 54px; font-weight: 900; color: #1a202c; line-height: 1.2; letter-spacing: -0.02em; border-bottom: 6px solid var(--primary); display: inline-block; padding-bottom: 10px; }

.sl-body { flex: 1; padding: 20px 80px 80px 80px; display: flex; gap: 60px; align-items: center; }

/* ヒーロー（表紙）- 圧倒的なインパクト */
.layout-hero { flex-direction: row !important; background: #fff; }
.hero-img { flex: 1.5; height: 100%; position: relative; clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); }
.hero-img img { width: 100%; height: 100%; object-fit: cover; }
.hero-content { flex: 1; padding: 100px 80px 100px 40px; display: flex; flex-direction: column; justify-content: center; background: var(--primary); color: #fff; z-index: 20; }
.hero-title { font-size: 82px; font-weight: 900; line-height: 1.1; color: #ffffff; margin-bottom: 40px; word-break: keep-all; }
.hero-desc { font-size: 26px; color: #ffffff; font-weight: 700; line-height: 1.6; position: relative; padding-left: 30px; border-left: 8px solid #FF8C00; }

/* リスト・標準 */
.list-content { flex: 1.2; display: flex; flex-direction: column; gap: 24px; }
.list-item { display: flex; align-items: center; gap: 20px; padding: 25px 35px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s; }
.list-item-num { font-size: 24px; font-weight: 900; color: var(--primary); min-width: 40px; }
.list-item-text { font-size: 26px; font-weight: 700; color: #2d3748; }

.list-visual { flex: 1; height: 100%; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; }
.list-visual img { width: 100%; height: 100%; object-fit: cover; }
.list-visual::after { content: ''; position: absolute; inset: 0; border: 12px solid rgba(255,255,255,0.2); pointer-events: none; }

/* ハブ型 */
.hub-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
.hub-item { padding: 30px; background: #fff; border-radius: 20px; border-bottom: 6px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
.hub-title { font-size: 22px; font-weight: 900; color: var(--primary); margin-top: 15px; }

@keyframes spin { to { transform: rotate(360deg); } }

footer { text-align: center; padding: 50px; color: #94A3B8; font-size: 15px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>Pres</span> Generator | Enterprise</div>
</header>

<main>
  <div class="steps-bar">
    <div class="step active" id="st1"><div class="step-num">1</div>既存資料解析</div>
    <div class="step-line"></div>
    <div class="step" id="st2"><div class="step-num">2</div>原稿ファイル投入</div>
    <div class="step-line"></div>
    <div class="step" id="st3"><div class="step-num">3</div>構成案確定</div>
    <div class="step-line"></div>
    <div class="step" id="st4"><div class="step-num">4</div>完成プレビュー</div>
  </div>

  <div class="card panel active" id="panel1">
    <div class="card-title">STEP 1　既存資料（テンプレート元）のアップロード</div>
    <div class="upload-area" id="area1">
      <input type="file" onchange="handleUpload(this)">
      <div style="font-size:50px;">📄</div>
      <p style="font-weight:800; margin-top:10px;" id="sub1">スライド画像をアップロードしてください</p>
    </div>
    <p style="margin-top:15px; font-size:13px; color:var(--text-sub);">※ 既存資料からブランドカラーやレイアウト構造を自動解析し、テンプレートを構築します。</p>
    <button class="btn-primary" style="margin-top:40px;" id="btnNext1" onclick="setStep(2)">解析して次へ →</button>
  </div>

  <div class="card panel" id="panel2">
    <div class="card-title">STEP 2　プレゼン原稿ファイルの投入</div>
    <div class="upload-area" id="area2" style="margin-bottom:30px;">
      <input type="file" accept=".txt" onchange="handleTextUpload(this)">
      <div style="font-size:50px;">📑</div>
      <p style="font-weight:800; margin-top:10px;" id="sub2">原稿ファイル（.txt）を選択してください</p>
    </div>
    <div class="field">
      <label>読み込まれた原稿（編集可能）</label>
      <textarea id="sourceText" placeholder="ファイルをアップロードするか、直接入力してください。"></textarea>
    </div>
    <button class="btn-primary" onclick="generateOutline()">AI構成案を生成する →</button>
  </div>

  <div class="card panel" id="panelL1"><div style="text-align:center; padding:60px;"><div style="width:40px; height:40px; border:4px solid var(--primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div><p>論理構造を構築中...</p></div></div>
  <div class="card panel" id="panelL2"><div style="text-align:center; padding:60px;"><div style="width:40px; height:40px; border:4px solid var(--primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div><p>デザインを適用中...</p></div></div>

  <div class="card panel" id="panel3">
    <div class="card-title">STEP 3　AI構成案の最終確認</div>
    <div id="outlineBox" style="background:#F8FAFC; padding:40px; border:2px solid #EDF2F7; border-radius:20px; white-space:pre-wrap; margin-bottom:30px; min-height:150px; font-size:15px; color:var(--text-main);"></div>
    <button class="btn-primary" onclick="buildPresentation()">この構成でスライドを構築する →</button>
  </div>

  <div class="card panel" id="panel4">
    <div class="card-title">STEP 4　完成プレビュー</div>
    <div class="slide-outer"><div class="slide-viewport" id="slideViewport"></div></div>
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:30px;">
      <button class="btn-primary" style="width:100px; padding:8px; background:#fff; color:var(--primary); border:1px solid var(--primary); font-size:12px;" onclick="navSlide(-1)">前へ</button>
      <div id="slideDots" style="display:flex; align-items:center; gap:8px;"></div>
      <button class="btn-primary" style="width:100px; padding:8px; background:#fff; color:var(--primary); border:1px solid var(--primary); font-size:12px;" onclick="navSlide(1)">次へ</button>
      <div style="width:1px; height:20px; background:#ddd; margin:0 10px;"></div>
      <button class="btn-primary" style="width:120px; padding:8px; background:#f0f9ff; color:#0369a1; border:1px solid #0369a1; font-size:12px;" onclick="toggleBg()">背景切替</button>
      <button class="btn-primary" style="width:120px; padding:8px; background:#f0fdf4; color:#15803d; border:1px solid #15803d; font-size:12px;" onclick="changeImg()">画像変更</button>
    </div>
    <button class="btn-primary" style="margin-bottom:10px;" onclick="downloadPPTX()">PowerPoint (.pptx) をダウンロード</button>
    <button class="btn-primary" style="margin-bottom:10px; background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="downloadHTML()">プレゼン用HTMLをダウンロード</button>
    <button class="btn-primary" style="background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="window.print()">PDFとして保存 (印刷)</button>
  </div>
</main>

<!-- 外部ライブラリの読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// PDF.jsの設定
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let themeColor = '#00796B', outline = '', slideData = [], currentSlide = 0, templateAnalysis = null;
const ICONS = ['🎯','⚡','💡','🌟','📊','🔍','🛠','📈','🚀','💎','🎨','🧩','📢'];

function setStep(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const id = ['panel1','panel2','panel3','panel4'][n-1];
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    if (n === 4) setTimeout(scaleSlides, 100);
  }
  document.querySelectorAll('.step').forEach((s, i) => { s.classList.toggle('active', i === n-1); s.classList.toggle('done', i < n-1); });
}

// PDFから画像への変換
async function convertPdfToImage(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.0 });
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  canvas.height = viewport.height; canvas.width = viewport.width;
  await page.render({ canvasContext: context, viewport: viewport }).promise;
  return canvas.toDataURL('image/png').split(',')[1];
}

async function handleUpload(input) {
  const file = input.files[0]; if(!file) return;
  document.getElementById('sub1').textContent = file.name + ' 解析中...';
  document.getElementById('area1').classList.add('has-file');
  try {
    let base64Data = '', mediaType = file.type;
    if (file.type === 'application/pdf') {
      base64Data = await convertPdfToImage(file);
      mediaType = 'image/png';
    } else {
      const reader = new FileReader();
      base64Data = await new Promise(r => { reader.onload = e => r(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
    }
    const res = await fetch('/api/analyze-template', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ imageBase64: base64Data, mediaType: mediaType }) });
    const data = await res.json();
    if(res.ok && data.analysis) {
      templateAnalysis = data.analysis;
      if(data.analysis.mainColor) { themeColor = data.analysis.mainColor; document.documentElement.style.setProperty('--primary', themeColor); }
      document.getElementById('sub1').textContent = file.name + ' 解析完了 ✓';
    } else { throw new Error(data.error || '解析失敗'); }
  } catch(err) {
    document.getElementById('sub1').textContent = '解析失敗。標準設定を使います。';
    alert('解析エラー: ' + err.message);
  }
}

function handleTextUpload(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('sourceText').value = e.target.result;
    document.getElementById('sub2').textContent = file.name + ' 読み込み完了 ✓';
    document.getElementById('area2').classList.add('has-file');
  };
  reader.readAsText(file);
}

async function generateOutline() {
  const source = document.getElementById('sourceText').value.trim();
  if(!source) return alert('原稿内容を入力してください');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panelL1').classList.add('active');
  try {
    const res = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ theme: 'ビジネスプレゼンテーション', notes: source, templateAnalysis: templateAnalysis }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    outline = data.result || '';
    document.getElementById('outlineBox').innerText = outline || "構成案の生成に失敗しました。";
    setStep(3);
  } catch(e) { setStep(2); alert('AI通信エラー: ' + e.message); }
}

function parseOutline(text) {
  if(!text) return [];
  const slides = [];
  // スライドの区切りをより柔軟に（先頭のスライドにも対応）
  const rawSections = text.split(/(?=スライド\s*\d+|---)/gi).filter(s => s.trim() && s.length > 10);
  
  rawSections.forEach((content, i) => {
    const lines = content.split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length === 0) return;

    let title = '', keyword = 'business', points = [];
    lines.forEach(l => {
      if (l.includes('キーワード')) {
        keyword = l.split(/[：:]/)[1]?.trim() || 'business';
      } else if (!title && !l.startsWith('・') && !l.includes('スライド')) {
        title = l.replace(/^[#*\s：:]+/, '').trim();
      } else if (l.startsWith('・')) {
        points.push(l.replace(/^・/, '').trim());
      }
    });

    if (!title && lines[0]) title = lines[0].replace(/スライド\s*\d+\s*[：:]?/, '').trim();
    if (!title) title = "Slide " + (i + 1);

    let layout = (i === 0) ? 'hero' : 'list';
    const low = content.toLowerCase();
    if (low.includes('比較')) layout = 'compare';
    else if (points.length >= 4) layout = 'hub';
    
    slides.push({ title, points, layout, keyword });
  });
  return slides;
}

function renderSlides() {
  const vp = document.getElementById('slideViewport'); vp.innerHTML = '';
  slideData.forEach((s, idx) => {
    const page = document.createElement('div'); page.className = 'slide-page'; page.id = `sp-${idx}`;
    const tc = themeColor;
    const sig = s.sig || 0;
    // images.unsplash.com を使用し、より安定かつ高画質な画像を取得
    const imgUrl = `https://images.unsplash.com/photo-${getFixedImageId(s.keyword)}?auto=format&fit=crop&w=1280&q=80&sig=${idx}_${sig}`;
    
    let html = `<div class="sl-wrap"><div class="sl-accent-bar"></div><div class="sl-bg-decor"><div class="sl-blob" style="width:1000px; height:1000px; background:${tc}; top:-200px; left:-200px;"></div></div>`;
    
    if (s.layout === 'hero') {
      html += `<div class="sl-wrap layout-hero"><div class="hero-img"><img src="${imgUrl}"></div><div class="hero-content"><div class="hero-title">${s.title}</div><div class="hero-desc">${s.points.join(' | ')}</div></div></div>`;
    } else if (s.layout === 'compare') {
      const mid = Math.ceil(s.points.length / 2);
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body"><div class="compare-grid"><div class="compare-box before"><span class="compare-tag" style="background:#718096">現状</span>${s.points.slice(0,mid).map(p=>`<div style="margin-bottom:15px; font-weight:700;">・ ${p}</div>`).join('')}</div><div class="compare-box after" style="border-color:${tc}; background:rgba(0,0,0,0.02);"><span class="compare-tag" style="background:${tc}">改善後</span>${s.points.slice(mid).map(p=>`<div style="color:${tc}; font-weight:900; margin-bottom:15px;">・ ${p}</div>`).join('')}</div></div></div>`;
    } else if (s.layout === 'hub') {
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body"><div class="hub-grid">${s.points.slice(0,4).map((p,pi)=>`<div class="hub-item"><div style="font-size:50px; margin-bottom:10px;">${ICONS[pi%ICONS.length]}</div><div class="hub-title">${p}</div></div>`).join('')}</div><div class="list-visual"><img src="${imgUrl}"></div></div>`;
    } else {
      html += `<div class="sl-header"><div class="sl-header-title">${s.title}</div></div><div class="sl-body"><div class="list-content">${s.points.map((p,pi)=>`<div class="list-item"><div class="list-item-num">0${pi+1}</div><div class="list-item-text">${p}</div></div>`).join('')}</div><div class="list-visual"><img src="${imgUrl}"></div></div>`;
    }
    html += `<div class="sl-footer-info"><div>CONFIDENTIAL | AI Presentation System</div><div>Page ${idx+1}</div></div></div>`;
    page.innerHTML = html; vp.appendChild(page);
  });
  scaleSlides();
}

// キーワードに応じた固定画像IDを返す（source.unsplash.comの不安定さを回避）
function getFixedImageId(keyword) {
  const map = {
    'business': '1497215728101-856f4ea42174',
    'team': '1522071823991-b5ae72c515d2',
    'growth': '1460925895917-afdab827c52f',
    'technology': '1518770660439-4636190af475',
    'success': '1552664730-d307ca884978',
    'trust': '1521791136364-7034717a0050',
    'future': '1451187580459-43490279c0fa'
  };
  return map[keyword.toLowerCase()] || '1497215728101-856f4ea42174';
}

function showSlide(idx) {
  document.querySelectorAll('.slide-page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(`sp-${idx}`); if(!page) return; page.classList.add('active');
  currentSlide = idx;
  document.querySelectorAll('.sdot').forEach((d,i)=>d.style.background = i===idx?themeColor:'#E2E8F0');
}

function animEl(id, anim) { const el = document.getElementById(id); if(!el) return; el.style.animation = 'none'; el.style.opacity = '0'; void el.offsetWidth; el.style.animation = anim; }

function buildPresentation() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panelL2').classList.add('active');
  setTimeout(() => { slideData = parseOutline(outline); renderSlides(); setStep(4); buildDots(); showSlide(0); }, 1000);
}

function scaleSlides() {
  const vp = document.getElementById('slideViewport'); if(!vp || vp.offsetWidth === 0) return;
  const s = vp.offsetWidth / 1280; vp.style.height = (720*s)+'px';
  vp.querySelectorAll('.slide-page').forEach(p => p.style.transform = `scale(${s})`);
}

function buildDots() {
  const dc = document.getElementById('slideDots'); dc.innerHTML = '';
  slideData.forEach((_,i) => {
    const d = document.createElement('div'); d.className = 'sdot';
    d.style = 'width:12px; height:12px; border-radius:50%; background:#E2E8F0; cursor:pointer;';
    d.onclick = () => showSlide(i); dc.appendChild(d);
  });
}

function navSlide(dir) { const next = currentSlide + dir; if(next >= 0 && next < slideData.length) showSlide(next); }

// PowerPointダウンロード機能（高精度ネイティブ配置版）
function downloadPPTX() {
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_16x9';
  const tc = themeColor.replace('#', '');

  slideData.forEach((s, idx) => {
    const slide = pptx.addSlide();
    const isDark = s.isDark || false;
    slide.background = { color: isDark ? tc : 'FFFFFF' };
    const txtColor = isDark ? 'FFFFFF' : '333333';
    const subColor = isDark ? 'E0E0E0' : '666666';

    const imgUrl = `https://source.unsplash.com/featured/1280x720/?${encodeURIComponent(s.keyword || 'business')}&sig=${idx}`;

    if (s.layout === 'hero') {
      slide.addImage({ path: imgUrl, x: 0, y: 0, w: '50%', h: '100%', sizing: { type: 'cover' } });
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: '50%', y: 0, w: '50%', h: '100%' });
      slide.addShape(pptx.ShapeType.rect, { fill: { color: 'FF8C00' }, x: '55%', y: '50%', w: 0.05, h: '20%' });
      slide.addText(s.title, { x: '55%', y: '25%', w: '40%', fontSize: 42, bold: true, color: 'FFFFFF', fontFace: 'Meiryo' });
      slide.addText(s.points.join(' | '), { x: '57%', y: '52%', w: '38%', fontSize: 18, color: 'FFFFFF', fontFace: 'Meiryo' });
    } else if (s.layout === 'hub') {
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.5, y: 0.4, w: 0.1, h: 0.5 });
      slide.addText(s.title, { x: 0.7, y: 0.45, fontSize: 32, bold: true, color: txtColor, fontFace: 'Meiryo' });
      
      const circleSize = 2.4;
      slide.addShape(pptx.ShapeType.ellipse, { fill: { color: tc }, x: 1.5, y: 1.8, w: circleSize, h: circleSize });
      slide.addText(s.title, { x: 1.5, y: 1.8, w: circleSize, h: circleSize, fontSize: 18, bold: true, color: 'FFFFFF', align: 'center', valign: 'middle', fontFace: 'Meiryo' });
      
      const positions = [{x:4.5,y:1.5}, {x:7.2,y:1.5}, {x:4.5,y:3.5}, {x:7.2,y:3.5}];
      s.points.slice(0,4).forEach((p, i) => {
        const pos = positions[i];
        slide.addShape(pptx.ShapeType.roundRect, { fill: { color: isDark?'FFFFFF10':'F8FAFC' }, line: { color: tc, width: 1 }, x: pos.x, y: pos.y, w: 2.2, h: 1.4, rectRadius: 0.1 });
        slide.addText(p, { x: pos.x, y: pos.y, w: 2.2, h: 1.4, fontSize: 14, color: txtColor, align: 'center', valign: 'middle', fontFace: 'Meiryo' });
      });
    } else {
      // 標準・リスト型
      slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.5, y: 0.4, w: 0.1, h: 0.5 });
      slide.addText(s.title, { x: 0.7, y: 0.45, fontSize: 32, bold: true, color: txtColor, fontFace: 'Meiryo' });
      
      const listW = 5.5;
      s.points.slice(0,5).forEach((p, i) => {
        slide.addShape(pptx.ShapeType.rect, { fill: { color: tc }, x: 0.8, y: 1.5 + (i * 0.9), w: 0.05, h: 0.7 });
        slide.addText(p, { x: 1.0, y: 1.5 + (i * 0.9), w: listW, fontSize: 20, bold: true, color: txtColor, fontFace: 'Meiryo' });
      });
      slide.addImage({ path: imgUrl, x: 6.8, y: 1.2, w: 2.8, h: 4.0, sizing: { type: 'cover' }, rounding: true });
    }
  });
  pptx.writeFile({ fileName: `presentation_${new Date().getTime()}.pptx` });
}

function toggleBg() {
  const s = slideData[currentSlide]; if(!s) return;
  s.isDark = !s.isDark;
  renderSlides(); showSlide(currentSlide);
}

function changeImg() {
  const s = slideData[currentSlide]; if(!s) return;
  s.sig = (s.sig || 0) + 1;
  renderSlides(); showSlide(currentSlide);
}

function downloadHTML() {
  const style = document.querySelector('style').innerHTML;
  const vp = document.getElementById('slideViewport');
  const pages = Array.from(vp.querySelectorAll('.slide-page')).map((p,i) => {
    const c = p.cloneNode(true); c.classList.toggle('active', i===0);
    // アニメーション設定を保持したままクローン
    return c.outerHTML;
  }).join('\n');
  
  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <title>Presentation</title>
  <style>${style}
  body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }
  .viewer { width:100vw; height:56.25vw; position:relative; background:#fff; margin:auto; top:50%; transform:translateY(-50%); overflow:hidden; }
  .slide-page { display:none; width:1280px; height:720px; position:absolute; top:0; left:0; transform-origin:top left; }
  .slide-page.active { display:block; }
  </style></head><body><div class="viewer" id="v">${pages}</div>
  <script>
    const v = document.getElementById('v'); const p = document.querySelectorAll('.slide-page');
    let cur = 0;
    function scale() { const s = window.innerWidth / 1280; v.style.height = (720*s)+'px'; p.forEach(x=>x.style.transform=\`scale(\${s})\`); }
    function show(n) { if(n<0||n>=p.length)return; p[cur].classList.remove('active'); cur=n; p[cur].classList.add('active'); }
    window.addEventListener('resize', scale); scale();
    window.addEventListener('keydown', e => { if(e.key==='ArrowRight'||e.key===' ') show(cur+1); if(e.key==='ArrowLeft') show(cur-1); });
  <\/script></body></html>`;
  
  const blob = new Blob([html], {type:'text/html'}); const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'presentation.html'; a.click();
}

window.addEventListener('resize', scaleSlides);
</script>
